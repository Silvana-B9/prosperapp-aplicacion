spring.application.name=prosperapp-aplicacion

# ---------------------------------------------------------------------
# Conexion a PostgreSQL
# ---------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5433/prosperapp_db
spring.datasource.username=postgres
spring.datasource.password=rodrigo123
spring.datasource.driver-class-name=org.postgresql.Driver

# ---------------------------------------------------------------------
# JPA / Hibernate
# ---------------------------------------------------------------------
# El esquema ya se crea con tablastrabajofinal.sql, por eso "validate":
# Hibernate solo compara las entidades contra las tablas existentes.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
