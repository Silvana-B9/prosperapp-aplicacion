<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- viewport: hace que la pagina se adapte al ancho del celular -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProsperApp - Iniciar sesion</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="pagina-login">

  <header class="cabecera-login">
    <h1>ProsperApp</h1>
    <p>Gestor de proyectos personales</p>
  </header>

  <main class="contenedor-login">
    <form id="formLogin" class="caja-login">
      <h2>Iniciar sesion</h2>

      <p id="mensajeError" class="mensaje-error" hidden></p>

      <label for="usuario">Usuario o correo</label>
      <input type="text" id="usuario" name="usuario" value="silvana@univalle.com" required>

      <label for="clave">Contrasena</label>
      <input type="password" id="clave" name="clave" value="Prueba1234" required>

      <button type="submit">Ingresar</button>
    </form>
  </main>

  <footer class="pie-pagina">
    <p>&copy; 2026 ProsperApp - Proyecto academico Universidad del Valle</p>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/usuarios.js"></script>
</body>
</html>
